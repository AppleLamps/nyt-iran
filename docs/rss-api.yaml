schemes:
  - https
produces:
  - application/xml
paths:
  "/{section}.xml":
    get:
      summary: Returns a list of articles for a given section.
      description: |
        Given section name, return lists of articles ranked on the section front.
      parameters:
        - name: section
          in: path
          description: "Section name (Arts, Africa, Americas, ...)."
          required: true
          type: string
          enum:
            - Africa
            - Americas
            - ArtandDesign
            - Arts
            - AsiaPacific
            - Automobiles
            - Baseball
            - Books/Review
            - Business
            - Climate
            - CollegeBasketball
            - CollegeFootball
            - Dance
            - Dealbook
            - DiningandWine
            - Economy
            - Education
            - EnergyEnvironment
            - Europe
            - FashionandStyle
            - Golf
            - Health
            - Hockey
            - HomePage
            - Jobs
            - Lens
            - MediaandAdvertising
            - MiddleEast
            - MostEmailed
            - MostShared
            - MostViewed
            - Movies
            - Music
            - NYRegion
            - Obituaries
            - PersonalTech
            - Politics
            - ProBasketball
            - ProFootball
            - RealEstate
            - Science
            - SmallBusiness
            - Soccer
            - Space
            - Sports
            - SundayBookReview
            - Sunday-Review
            - Technology
            - Television
            - Tennis
            - Theater
            - TMagazine
            - Travel
            - Upshot
            - US
            - Weddings
            - Well
            - World
            - YourMoney
          default: HomePage
      tags:
        - RSS
      responses:
        "200":
          description: A list of articles.
          schema:
            type: object
            properties:
              channel:
                type: object
                properties:
                  atom:link:
                    type: string
                  copyright:
                    type: string
                  description:
                    type: string
                  image:
                    $ref: "#/definitions/Image"
                  item:
                    type: array
                    items:
                      $ref: "#/definitions/Item"
                  language:
                    type: string
                  lastBuildDate:
                    type: string
                  link:
                    type: string
                  title:
                    type: string
definitions:
  Image:
    type: object
    properties:
      link:
        type: string
      title:
        type: string
      url:
        type: string
  Item:
    type: object
    properties:
      atom:link:
        type: string
      category:
        type: string
      description:
        type: string
      dc:creator:
        type: string
      guid:
        type: string
      link:
        type: string
      media:content:
        type: string
      media:credit:
        type: string
      media:description:
        type: string
      pubDate:
        type: string
      title:
        type: string
